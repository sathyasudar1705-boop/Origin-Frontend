<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Jobs | OriginX</title>
    <link rel="stylesheet" href="../css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .saved-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            padding-bottom: 40px;
        }

        .saved-card {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #f0f2f9;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 10px 30px rgba(112, 144, 176, 0.04);
        }

        .saved-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(112, 144, 176, 0.1);
        }

        .card-header {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            align-items: center;
        }

        .company-logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            background: #f4f7fe;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--primary);
            border: 1px solid #e0e5f2;
        }

        .job-title-info h3 {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2px;
        }

        .job-title-info p {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }

        .meta-tag {
            background: #f4f7fe;
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #f4f7fe;
        }

        .btn-launch {
            flex: 2;
            background: var(--primary);
            color: white;
            padding: 10px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
            transition: var(--transition);
        }

        .btn-remove-alt {
            flex: 1;
            background: #fffafa;
            color: #ff4d4f;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ffe6e6;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: var(--transition);
        }

        .btn-remove-alt:hover {
            background: #ff4d4f;
            color: white;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 40px;
            background: white;
            border-radius: 20px;
            border: 2px dashed #e0e5f2;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .browse-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body>

        <main class="main-area">
            <div class="main-container">
                <header class="top-bar">
                    <div class="user-actions-mobile">
                        <button class="menu-toggle" onclick="toggleSidebar()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h16m-7 6h7" />
                            </svg>
                        </button>
                        <a href="dashboard.html" class="mobile-logo-dash">Origin<span>X</span></a>
                    </div>
                    <div class="header-info">
                        <p>Applications Tracking</p>
                        <h1>Bookmarked Roles</h1>
                    </div>

                    <div class="user-actions">
                        <button class="icon-btn" id="notificationBtn">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                            </svg>
                            <span class="notification-dot" id="notificationDot"></span>
                        </button>
                        <a href="profile.html">
                            <img src="https://ui-avatars.com/api/?name=User&background=4318ff&color=fff" alt="Profile"
                                class="user-avatar" id="topNavProfilePic">
                        </a>
                    </div>
                </header>

                <div class="saved-grid" id="savedList">
                    <!-- Loaded via JS -->
                </div>
            </div> <!-- End main-container -->
        </main>
    </div>

    <script src="../js/config.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const list = document.getElementById("savedList");
            const savedJobs = JSON.parse(localStorage.getItem("saved_jobs") || "[]");

            // Handle profile pic from logged user
            const user = JSON.parse(localStorage.getItem("user"));
            if (user && user.profile_image) {
                const topPic = document.getElementById("topNavProfilePic");
                if (topPic) topPic.src = `${API_BASE_URL}${user.profile_image}`;
            }

            if (savedJobs.length === 0) {
                list.style.display = "block";
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🔖</div>
                        <h2>Your collection is empty</h2>
                        <p>Save interesting roles while browsing to find them here later.</p>
                        <a href="jobs.html" class="browse-link">Browse Opportunities →</a>
                    </div>
                `;
                return;
            }

            const uniqueJobs = [...savedJobs].reverse();

            uniqueJobs.forEach((job, index) => {
                const card = document.createElement("div");
                card.className = "saved-card";

                const companyName = job.company_name || 'Enterprise Partner';
                const initial = companyName.charAt(0);
                const logoUrl = job.company_logo;

                let logoHtml = `<div class="company-logo">${initial}</div>`;
                if (logoUrl) {
                    const finalLogoUrl = logoUrl.startsWith('http') ? logoUrl : `${API_BASE_URL}${logoUrl}`;
                    logoHtml = `<div class="company-logo" style="overflow: hidden; display: flex; align-items: center; justify-content: center;">
                        <img src="${finalLogoUrl}" alt="${companyName}" style="width:100%; height:100%; object-fit:cover;" onerror="this.parentElement.innerHTML='${initial}'">
                    </div>`;
                }

                const typeBadge = job.type === 'Part-Time' ? 'Part-Time' : 'Full-Time';
                const detailUrl = job.type === 'Part-Time' ? 'part_time_jobs.html' : 'jobs.html';

                card.innerHTML = `
                    <div class="card-header">
                        ${logoHtml}
                        <div class="job-title-info">
                            <h3>${job.title}</h3>
                            <p>${companyName}</p>
                        </div>
                    </div>

                    <div class="card-meta">
                        <div class="meta-tag">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            ${job.location || 'Remote'}
                        </div>
                        <div class="meta-tag">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            ${typeBadge}
                        </div>
                        <div class="meta-tag">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            ${job.salary || 'Competitive'}
                        </div>
                    </div>
                    <div class="card-actions">
                        <a href="${detailUrl}" class="btn-launch">Launch Details</a>
                        <button class="btn-remove-alt" onclick="removeJob(${index})">Remove</button>
                    </div>
                `;
                list.appendChild(card);
            });
        });

        function removeJob(index) {
            let savedJobs = JSON.parse(localStorage.getItem("saved_jobs") || "[]");
            savedJobs.reverse();
            savedJobs.splice(index, 1);
            savedJobs.reverse();
            localStorage.setItem("saved_jobs", JSON.stringify(savedJobs));
            location.reload();
        }
    </script>
    <script src="../js/nav-profile.js"></script>
</body>
