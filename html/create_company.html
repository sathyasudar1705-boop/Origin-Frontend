<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Company Profile | OriginX Business</title>
    <link rel="stylesheet" href="../css/company_dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .setup-card {
            background: var(--bg-white);
            border-radius: var(--radius-xl);
            padding: 50px;
            box-shadow: var(--shadow-card);
            max-width: 700px;
            margin: 40px auto;
        }

        .setup-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .setup-header h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 12px;
        }

        .setup-header p {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 16px 20px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: #f8faff;
            font-size: 15px;
            color: var(--text-main);
            transition: var(--transition);
            outline: none;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 4px 20px rgba(67, 24, 255, 0.05);
        }

        .finish-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 20px;
        }

        .finish-btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 10px 30px rgba(67, 24, 255, 0.2);
        }
    </style>
</head>

<body>

    <div class="app-wrapper">
        <aside class="sidebar">
            <a href="company_dashboard.html" class="sidebar-logo">Origin<span>X</span></a>

            <nav class="nav-menu">
                <p class="nav-label">Onboarding</p>
                <a href="#" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Setup Identity
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="../index.html" class="nav-item logout-link" style="color: #ff4d4f;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Log out
                </a>
            </div>
        </aside>

        <main class="main-area">
            <div class="setup-card">
                <div class="setup-header">
                    <h1 id="welcomeTitle">Establish Entity</h1>
                    <p>Provide the core business details to unlock the OriginX recruiter stack.</p>
                </div>

                <form id="setupCompanyForm">
                    <div class="input-group">
                        <label>Industry Vertical</label>
                        <input type="text" id="compIndustry" placeholder="Enter Industry (e.g. Technology, Healthcare)"
                            required>
                    </div>

                    <div class="input-group">
                        <label>Business Website</label>
                        <input type="url" id="compWebsite" placeholder="https://www.yourcompany.com">
                    </div>

                    <div class="input-group">
                        <label>Primary Contact</label>
                        <input type="text" id="compPhone" placeholder="Enter Business Phone No.">
                    </div>

                    <div class="input-group">
                        <label>Brand Narrative (Description)</label>
                        <textarea id="compDesc" rows="5"
                            placeholder="Define your company mission, culture, and expertise..."></textarea>
                    </div>

                    <button type="submit" class="finish-btn" id="submitBtn">Finalize Corporate Profile</button>
                </form>
            </div>
    </div>

    </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/create_company.js"></script>
</body>

</html>
