<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Pipeline | OriginX Business</title>
    <link rel="stylesheet" href="../css/company_dashboard.css">
    <link rel="stylesheet" href="../css/company_applications.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-wrapper">

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar">
            <a href="company_dashboard.html" class="sidebar-logo">Origin<span>X</span> <em>Hiring</em></a>

            <nav class="nav-menu">
                <p class="nav-label">Company</p>
                <a href="company_dashboard.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                    Dashboard
                </a>
                <a href="company_applications.html" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    Candidates
                </a>
                <a href="company_profile.html" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                    </svg>
                    Brand Profile
                </a>

                <div style="padding: 0 10px;">
                    <button class="btn-sidebar-post" id="openPostModalSidebar">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Post a Job
                    </button>
                </div>
            </nav>

            <div class="sidebar-footer">
                <a href="../index.html" class="nav-item logout-link">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Log out
                </a>
            </div>
        </aside>

        <!-- ===== MAIN AREA ===== -->
        <main class="main-area">
            <div class="main-container">
                <header class="top-bar">
                    <div class="header-info">
                        <p id="companyNameDisplay">Employer Hub</p>
                        <h1>Talent Pipeline</h1>
                    </div>
                    <div class="header-actions">
                        <div class="filter-wrap">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none"
                                viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                            </svg>
                            <select id="statusFilter">
                                <option value="all">All Candidates</option>
                                <option value="Applied">Applied</option>
                                <option value="Shortlisted">Shortlisted</option>
                                <option value="Selected">Selected</option>
                                <option value="Cancelled">Rejected / Withdrawn</option>
                            </select>
                        </div>
                        <a href="company_profile.html" class="company-avatar-link" title="View Brand Profile">
                            <div class="company-avatar-wrap">
                                <div class="company-initials" id="companyInitialsAvatar"
                                    style="overflow:hidden; display:flex; align-items:center; justify-content:center;">C
                                </div>
                            </div>
                        </a>
                    </div>
                </header>

                <!-- Candidate List -->
                <div class="apps-list-container">
                    <div id="applicationsFullList">
                        <p class="apps-loading">Scanning candidate records...</p>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- ===== APPLICATION DETAIL MODAL ===== -->
    <div id="appDetailModal" class="modal">
        <div class="modal-card wide-modal">
            <div class="modal-top">
                <div>
                    <h3 id="detailCandidateName">Candidate Name</h3>
                    <span id="detailStatusBadge" class="status-badge status-applied">Applied</span>
                </div>
                <button id="closeDetailModal" class="modal-close-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="candidate-detail-grid">
                <div class="candidate-detail-col">
                    <div class="detail-info-block">
                        <span class="detail-label">Email</span>
                        <span class="detail-value" id="detailEmail">—</span>
                    </div>
                    <div class="detail-info-block">
                        <span class="detail-label">Phone</span>
                        <span class="detail-value" id="detailPhone">—</span>
                    </div>
                    <div class="detail-info-block">
                        <span class="detail-label">Location</span>
                        <span class="detail-value" id="detailLocation">—</span>
                    </div>
                    <div class="detail-info-block">
                        <span class="detail-label">Experience</span>
                        <span class="detail-value" id="detailExperience">—</span>
                    </div>
                    <div class="detail-info-block">
                        <span class="detail-label">Expected Salary</span>
                        <span class="detail-value" id="detailSalary">—</span>
                    </div>
                </div>
                <div class="candidate-detail-col">
                    <div class="detail-info-block">
                        <span class="detail-label">Applied For</span>
                        <span class="detail-value accent-text" id="detailJobTitle">—</span>
                    </div>
                    <div class="detail-info-block">
                        <span class="detail-label">Key Skills</span>
                        <span class="detail-value" id="detailSkills">—</span>
                    </div>
                    <div class="detail-info-block">
                        <span class="detail-label">Resume</span>
                        <a id="detailResume" href="#" target="_blank" class="resume-link">View Resume →</a>
                    </div>
                </div>
            </div>

            <div class="modal-footer-actions" id="modalActions">
                <button id="shortlistBtn" class="btn-shortlist">⭐ Shortlist</button>
                <button id="selectBtn" class="btn-select">✓ Select</button>
                <button id="rejectBtn" class="btn-reject">✕ Reject</button>
                <button id="closeAppBtn" class="btn-cancel">Close</button>
            </div>
        </div>
    </div>

    <!-- ===== POST JOB MODAL ===== -->
    <div id="postJobModal" class="modal">
        <div class="modal-card">
            <div class="modal-top">
                <h3>Post a New Job</h3>
                <button id="closeModal" class="modal-close-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="postJobForm">
                <div class="form-group">
                    <label>Job Type</label>
                    <select id="jobType">
                        <option value="full-time">Full-time</option>
                        <option value="part-time">Part-time</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="jobTitle" placeholder="Enter Job Title (e.g. Software Engineer)" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="jobLocation" placeholder="Enter Job Location" required>
                    </div>
                    <div class="form-group">
                        <label>Salary Range</label>
                        <input type="text" id="jobSalary" placeholder="Enter Salary Range (e.g. 5-10 LPA)">
                    </div>
                </div>
                <div class="form-group">
                    <label>Required Skills</label>
                    <input type="text" id="jobSkills" placeholder="Enter Skills (Comma Separated)">
                </div>
                <div class="form-group">
                    <label>Job Description</label>
                    <textarea id="jobDesc" rows="4"
                        placeholder="Describe the role, responsibilities, and ideal candidate..."></textarea>
                </div>
                <div class="modal-footer-actions">
                    <button type="button" id="cancelPostBtn" class="btn-cancel">Cancel</button>
                    <button type="submit" class="btn-submit">Publish Job</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/company_applications.js"></script>
</body>

</html>
